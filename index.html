<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#17313b" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.tile.openstreetmap.org https://tile.openstreetmap.org; connect-src 'self' https://nominatim.openstreetmap.org https://cloudflareinsights.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
    />
    <meta
      name="cloudflare-analytics-token"
      content="c542349f664441718013fe44c7f4b739"
    />
    <meta
      name="description"
      content="MediMap — Outil d'aide à l'orientation médicale par sectorisation territoriale (Hérault)"
    />
    <link rel="icon" href="favicon.svg?v=20260319-1735" type="image/svg+xml" />
    <title>SAMU34 - Sectorisation Urgences</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css?v=20260319-1735" />
    <!-- App CSS -->
    <link rel="stylesheet" href="style.css?v=20260418-1055" />
  </head>
  <body>
    <noscript>
      <div
        style="
          padding: 12px 16px;
          background: #fff4e5;
          color: #7a4b00;
          border-bottom: 1px solid #f0d39a;
        "
      >
        Cette application nécessite JavaScript pour fonctionner correctement.
      </div>
    </noscript>

    <div class="app" id="appRoot">
      <!-- ═══════════ MAP ═══════════ -->
      <div class="map-wrap">
        <div id="map"></div>
        <div class="legend" id="legend"></div>
      </div>

      <!-- ═══════════ FLOATING CONSOLE ═══════════ -->
      <aside class="panel">
        <div class="section">
          <div class="console-title-row">
            <h2>Sectorisation Urgences 34</h2>
            <div class="header-logos" aria-label="Partenaires">
              <img
                src="assets/logo_chu.svg.png"
                alt="Logo CHU"
                class="header-logo header-logo-chu"
              />
              <img
                src="assets/logo_ars.png"
                alt="Logo ARS"
                class="header-logo header-logo-ars"
              />
            </div>
          </div>
          <div class="soft-box">
            <div class="stack">
              <!-- Symptôme -->
              <div id="symptomField">
                <div class="field-label-row">
                  <label for="symptomInput">Motif d'appel :</label>
                  <span
                    id="symptomError"
                    class="field-error hidden"
                    aria-live="polite"
                  >
                    Choisir un motif valable
                  </span>
                </div>
                <div class="autocomplete-wrap">
                  <input
                    id="symptomInput"
                    type="text"
                    placeholder="Rechercher un motif…"
                    autocomplete="off"
                    role="combobox"
                    aria-autocomplete="list"
                    aria-expanded="false"
                    aria-controls="suggestBox"
                    aria-haspopup="listbox"
                  />
                  <div
                    id="suggestBox"
                    class="suggest-box hidden"
                    role="listbox"
                    aria-label="Suggestions de motifs"
                  ></div>
                </div>
              </div>

              <!-- Commune -->
              <div>
                <label for="cityInput">Localisation :</label>
                <div class="autocomplete-wrap">
                  <input
                    id="cityInput"
                    type="text"
                    placeholder="Commune / Etablissement / Adresse (montpellieraine) …"
                    autocomplete="off"
                    role="combobox"
                    aria-autocomplete="list"
                    aria-expanded="false"
                    aria-controls="citySuggestBox"
                    aria-haspopup="listbox"
                  />
                  <div
                    id="citySuggestBox"
                    class="suggest-box hidden"
                    role="listbox"
                    aria-label="Suggestions de communes et quartiers"
                  ></div>
                  <select id="citySelect" class="hidden"></select>
                </div>
              </div>

              <!-- Sous-zone (Montpellier / Lattes) -->
              <div id="subzoneWrap" class="hidden">
                <label for="subzoneSelect">Quartier :</label>
                <select id="subzoneSelect"></select>
              </div>

              <!-- Filière -->
              <div class="detected-specialty-field">
                <div class="field-label-row">
                  <label for="detectedSpecialty">Filière :</label>
                  <button
                    id="filieresInfoBtn"
                    type="button"
                    class="info-trigger"
                    aria-haspopup="true"
                    aria-controls="filieresPanel"
                    aria-expanded="false"
                    aria-label="Afficher les filières"
                  >
                    ?
                  </button>
                </div>
                <input
                  id="detectedSpecialty"
                  type="text"
                  placeholder="..."
                  readonly
                  aria-readonly="true"
                />
              </div>

              <!-- Boutons action -->
              <div class="row">
                <button id="focusBtn" class="btn-danger">Effacer</button>
                <button id="regulateBtn" class="btn-primary">
                  Orientation
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Footer -->
        <div class="panel-footer">
          <span>Crédits : Dr GHOMRANI & Dr MAHMOUDI</span>
        </div>
      </aside>
    </div>

    <div
      class="filieres-panel hidden"
      id="filieresPanel"
      role="region"
      aria-labelledby="filieresTitle"
    >
      <div class="filieres-card">
        <div class="feedback-card-top">
          <div>
            <h2 id="filieresTitle">Filières</h2>
          </div>
          <button
            id="filieresCloseBtn"
            type="button"
            class="feedback-close"
            aria-label="Masquer la fenêtre des filières"
          >
            ×
          </button>
        </div>
        <div class="soft-box filieres-box">
          <div class="chips" id="chips"></div>
        </div>
      </div>
    </div>

    <div
      class="auth-overlay hidden"
      id="authOverlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="authTitle"
    >
      <div class="auth-card">
        <div class="auth-eyebrow">Accès protégé</div>
        <h2 id="authTitle">Déverrouiller la carte</h2>
        <p class="auth-text">
          Entrez le mot de passe pour afficher la sectorisation.
        </p>
        <form id="authForm" class="auth-form">
          <div class="auth-password-row">
            <input
              id="authPassword"
              type="password"
              autocomplete="current-password"
              placeholder="Mot de passe"
            />
            <button
              type="button"
              id="authTogglePasswordBtn"
              class="auth-toggle-password"
              aria-controls="authPassword"
              aria-pressed="false"
            >
              Afficher
            </button>
          </div>
          <div id="authError" class="auth-error hidden" aria-live="polite">
            Mot de passe incorrect.
          </div>
          <button type="submit" id="authUnlockBtn" class="btn-primary">
            Accéder à la carte
          </button>
        </form>
      </div>
    </div>

    <!-- Scripts : data d'abord, puis domaine / UI, puis Leaflet, puis app -->
    <script src="generated/sectorization-data.js?v=20260402-1253"></script>
    <script src="data.js?v=20260402-1253"></script>
    <script src="generated/montpellier_street_index.js?v=20260324-1621"></script>
    <script src="domain.js?v=20260319-1735"></script>
    <script src="application.js?v=20260319-1735"></script>
    <script src="autocomplete.js?v=20260319-1735"></script>
    <script src="city-input-controller.js?v=20260324-1915"></script>
    <script src="map-renderer-static.js?v=20260501-1755"></script>
    <script src="map-renderer-layout.js?v=20260324-2015"></script>
    <script src="vendor/leaflet/leaflet.js?v=20260319-1735"></script>
    <script src="map-renderer.js?v=20260324-2015"></script>
    <script src="app.js?v=20260418-1055"></script>
    <script src="analytics.js?v=20260418-1115"></script>
  </body>
</html>
